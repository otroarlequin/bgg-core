# fly.toml app configuration file generated for bgg-core
# See https://fly.io/docs/reference/configuration/

app = 'bgg-core'
primary_region = 'mia'

[build]

[env]
  HOST = '0.0.0.0'
  PORT = '3001'
  BGG_DB_PATH = '/data/bgg.db'
  WEB_ROOT = '/app/web/dist'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/health'

[[mounts]]
  source = 'bgg_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
